# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

build:
  dockerBuildPath: ../../
startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - awsRegion
      - awsAccessKeyId
      - awsSecretAccessKey
    properties:
      awsRegion:
        type: string
        description: The AWS region to be used for the retrieval operation.
      awsAccessKeyId:
        type: string
        description: AWS Access Key ID for authentication.
      awsSecretAccessKey:
        type: string
        description: AWS Secret Access Key for authentication.
  commandFunction:
    # A function that produces the CLI command to start the MCP on stdio.
    |-
    (config) => ({command: 'node', args: ['dist/index.js'], env: {AWS_REGION: config.awsRegion, AWS_ACCESS_KEY_ID: config.awsAccessKeyId, AWS_SECRET_ACCESS_KEY: config.awsSecretAccessKey}})
